<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Provision Client | Kunal Auth</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
        body { 
            font-family: 'Space Grotesk', sans-serif; 
            background-color: #050505;
            background-image: radial-gradient(#1a1a1a 1px, transparent 1px);
            background-size: 24px 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .bento-border { border: 1px solid #1f1f1f; }
        .card-bg { background: rgba(10, 10, 10, 0.98); backdrop-filter: blur(20px); }
        
        input:focus { 
            outline: none; 
            border-color: #3f3f46; 
            background: #0d0d0d !important;
        }
    </style>
</head>
<body class="text-zinc-400 antialiased p-6">

    <div class="card-bg bento-border rounded-2xl p-6 md:p-8 w-full max-w-[380px] shadow-2xl">
        
        <div class="flex items-center gap-3 mb-8">
            <div class="w-10 h-10 bg-white text-black flex items-center justify-center rounded-lg font-bold text-xl shadow-lg">
                K
            </div>
            <div>
                <h1 class="text-white font-bold leading-none tracking-tight text-lg">Kunal Auth</h1>
                <span class="text-[9px] mono text-zinc-600 uppercase tracking-[0.2em] block">Security Provisioning</span>
            </div>
        </div>

        <h2 class="text-white font-bold text-base tracking-tight mb-6">Get a Client ID and Secret</h2>

        <form id="registrationForm" class="space-y-4">
            <div class="space-y-1.5">
                <label class="block text-[10px] mono uppercase tracking-widest text-zinc-500 ml-1">Application Name</label>
                <input type="text" id="app_name" placeholder="Acme App" 
                    class="w-full bg-[#0a0a0a] bento-border rounded-lg px-4 py-2.5 text-zinc-200 text-sm transition-all placeholder:text-zinc-800" required />
            </div>

            <div class="space-y-1.5">
                <label class="block text-[10px] mono uppercase tracking-widest text-zinc-500 ml-1">Website URL</label>
                <input type="url" id="website_url" placeholder="https://acme.com" 
                    class="w-full bg-[#0a0a0a] bento-border rounded-lg px-4 py-2.5 text-zinc-200 text-sm transition-all placeholder:text-zinc-800" required />
            </div>

            <div class="space-y-1.5">
                <label class="block text-[10px] mono uppercase tracking-widest text-zinc-500 ml-1">Redirect URI</label>
                <input type="text" id="redirect_uri" placeholder="https://acme.com/callback" 
                    class="w-full bg-[#0a0a0a] bento-border rounded-lg px-4 py-2.5 text-zinc-200 text-xs mono transition-all placeholder:text-zinc-800" required />
            </div>

            <div class="pt-2">
                <button type="submit" 
                    class="w-full bg-white text-black font-bold py-3.5 rounded-lg text-xs uppercase tracking-widest hover:bg-zinc-200 transition-all active:scale-[0.98]">
                    Register application
                </button>
            </div>
        </form>

       
    </div>

    <script>
        const form = document.getElementById("registrationForm");

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.innerText = "PROVISIONING...";
            btn.disabled = true;
         
            setTimeout(() => { 
                alert("Registered Successfully!");
                btn.innerText = "Register application";
                btn.disabled = false;
            }, 1000);
        });
    </script>
</body>
</html>
