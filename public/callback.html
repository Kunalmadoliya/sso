<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Signing you in...</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Inter", sans-serif;
        background: #09090b;
        color: #fafafa;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .card {
        width: 100%;
        max-width: 380px;
        background: #18181b;
        border: 1px solid #27272a;
        border-radius: 12px;
        padding: 40px 30px;
        text-align: center;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
      }

      h2 {
        font-size: 1.4rem;
        margin-bottom: 10px;
      }

      p {
        font-size: 0.9rem;
        color: #a1a1aa;
        margin-bottom: 20px;
      }

      .spinner {
        width: 28px;
        height: 28px;
        border: 3px solid #27272a;
        border-top-color: #fafafa;
        border-radius: 50%;
        margin: 0 auto;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .error {
        color: #ef4444;
        margin-top: 15px;
        display: none;
      }
    </style>
  </head>

  <body>
    <div class="card">
      <h2>Signing you in...</h2>
      <p>Please wait while we complete authentication</p>
      <div class="spinner"></div>
      <div class="error" id="errorMsg"></div>
    </div>

    <script>
      const params = new URLSearchParams(window.location.search);
      const code = params.get("code");
      const errorBox = document.getElementById("errorMsg");

      async function exchange() {
        if (!code) {
          showError("Missing authorization code");
          return;
        }

        try {
          const res = await fetch("http://localhost:3000/o/token", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
              code,
              client_id: "c0a014b4699d53eef179fe847585125d",
              client_secret:
                "8922d25a78adcf8a0998c68d550603a04a64a6430c1f0e6345cfe045402abe9f",
            }),
          });

          const data = await res.json();

          if (!res.ok) {
            return showError(data.message || "Authentication failed");
          }

          localStorage.setItem("token", data.access_token);
          const redirect_uri = params.get("redirect_uri");

          if (!redirect_uri) {
            showError("Missing redirect_uri");
            throw new Error();
          }

          window.location.href = redirect_uri;
        } catch {
          showError("Server error. Try again.");
        }
      }

      function showError(msg) {
        errorBox.style.display = "block";
        errorBox.innerText = msg;
      }

      exchange();
    </script>
  </body>
</html>
