<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Console | Kunal Auth</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Space Grotesk", sans-serif;
        background-color: #050505;
        background-image: radial-gradient(#1a1a1a 1px, transparent 1px);
        background-size: 32px 32px;
      }
      .mono {
        font-family: "JetBrains Mono", monospace;
      }
      .bento-border {
        border: 1px solid #1f1f1f;
      }
      .card-bg {
        background: rgba(10, 10, 10, 0.95);
        backdrop-filter: blur(12px);
      }
      .app-card:hover {
        border-color: #3f3f46;
        background: rgba(20, 20, 20, 0.5);
      }
      .text-label {
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        font-weight: 600;
        color: #52525b;
      }
    </style>
  </head>

  <body class="text-zinc-400 antialiased py-8 px-4 sm:px-8">
    <div class="max-w-7xl mx-auto space-y-6">
      <nav
        class="card-bg bento-border rounded-xl p-5 flex justify-between items-center shadow-lg"
      >
        <div class="flex items-center gap-4">
          <div
            class="w-11 h-11 bg-white text-black flex items-center justify-center rounded-lg font-bold text-xl shadow-[0_0_20px_rgba(255,255,255,0.05)]"
          >
            K
          </div>
          <div class="hidden sm:block">
            <h1
              id="appTitle"
              class="text-white font-bold leading-none text-base"
            >
              Kunal Auth
            </h1>
            <span
              class="text-xs mono text-zinc-600 uppercase tracking-wider block mt-1"
            >
              Console v2
            </span>
          </div>
        </div>

        <div class="flex items-center gap-6 text-label mono">
          <a href="#" class="text-white border-b-2 border-white pb-0.5">Apps</a>

          <button
            id="logoutBtn"
            onclick="logout()"
            class="bg-zinc-900 px-4 py-2 rounded-lg text-zinc-400 hover:text-red-400 bento-border transition"
          >
            Logout
          </button>
        </div>
      </nav>

      <div class="grid grid-cols-12 gap-6">
        <div class="col-span-12 lg:col-span-8 space-y-6">
          <div
            class="card-bg bento-border rounded-2xl p-8 flex flex-col md:flex-row justify-between items-start md:items-center gap-6"
          >
            <div>
              <h2
                id="sectionTitle"
                class="text-3xl font-bold text-white tracking-tight"
              >
                Active Clients
              </h2>
              <p id="sectionDesc" class="text-sm text-zinc-500 mt-1">
                Manage your OAuth 2.0 application credentials and scopes.
              </p>
            </div>

            <a
              id="newAppBtn"
              href="./register-company.html"
              class="bg-white text-black text-xs font-bold uppercase tracking-wider px-5 py-3 rounded-lg hover:bg-zinc-200 transition-all flex items-center gap-2 shadow-lg hover:scale-[1.02]"
            >
              <span>+</span> New Application
            </a>
          </div>

          <div
            class="grid grid-cols-1 md:grid-cols-2 gap-6"
            id="apps-container"
          >
            <div
              id="appCard"
              class="card-bg bento-border rounded-2xl p-6 app-card transition-all cursor-pointer group"
            >
              <div class="flex justify-between items-start mb-6">
                <div
                  class="w-12 h-12 bg-zinc-900 rounded-xl bento-border flex items-center justify-center text-zinc-500 group-hover:text-white transition shadow-inner"
                >
                  <svg
                    class="w-6 h-6"
                    fill="none"
                    stroke="currentColor"
                    viewBox="0 0 24 24"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="1.5"
                      d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9-9c1.657 0 3 4.03 3 9s-1.343 9-3 9m0-18c-1.657 0-3 4.03-3 9s1.343 9 3 9m-9-9h18"
                    ></path>
                  </svg>
                </div>

                <span
                  id="appStatus"
                  class="text-xs mono px-2.5 py-1 bg-emerald-500/10 text-emerald-500 rounded-full border border-emerald-500/20 font-bold uppercase tracking-wider"
                >
                  Live
                </span>
              </div>

              <h3 id="appName" class="text-white font-bold text-lg mb-1">
                E-commerce API
              </h3>

              <p id="appId" class="text-xs text-zinc-600 mono truncate mb-6">
                ID: 8291...x92
              </p>

              <div class="grid grid-cols-2 gap-3">
                <button
                  id="settingsBtn"
                  class="text-label mono py-2.5 bg-zinc-900 rounded-lg bento-border hover:text-white transition text-center"
                >
                  Settings
                </button>

                <button
                  id="revokeBtn"
                  class="text-label mono py-2.5 bg-zinc-900 rounded-lg bento-border hover:text-red-500 transition text-center"
                >
                  Revoke
                </button>
              </div>
            </div>

            <div
              class="border border-dashed border-zinc-900 rounded-2xl p-6 flex flex-col items-center justify-center text-center opacity-40 hover:opacity-80 transition-opacity"
            >
              <p class="text-label mono">Available Slot</p>
            </div>
          </div>
        </div>

        <div class="col-span-12 lg:col-span-4 space-y-6">
          <div class="card-bg bento-border rounded-2xl p-6">
            <p class="text-label mono mb-6">Operator Identity</p>

            <div class="flex items-center gap-4 mb-6">
              <div
                class="w-14 h-14 bg-gradient-to-br from-zinc-800 to-zinc-900 rounded-xl bento-border shadow-lg"
              ></div>

              <div class="overflow-hidden">
                <p id="userName" class="text-white font-bold truncate">
                  Kunal Madoliya
                </p>
                <p id="userEmail" class="text-xs mono text-zinc-600 truncate">
                  hello@gmail.com
                </p>
              </div>
            </div>
          </div>
        </div>
      </div>
      <!-- grid end -->
    </div>
    <!-- 🔥 FIX: THIS WAS MISSING -->

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const appName = document.getElementById("appName")?.innerText;
        const appId = document.getElementById("appId")?.innerText;
        const userName = document.getElementById("userName")?.innerText;
        const userEmail = document.getElementById("userEmail")?.innerText;

        async function fetchData() {
          try {
            const res = await fetch("/o/userinfo", {
              method: "GET",
              credentials: "include", 
            });

            const data = await res.json();
       
          } catch (error) {
            console.error(error);
          }
        }

        fetchData();
      });

      async function logout() {
        try {
          await fetch("/logout", {method: "POST"});
          window.location.href = "/";
        } catch {
          window.location.href = "/";
        }
      }
    </script>
  </body>
</html>
