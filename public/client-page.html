<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Console | Kunal Auth</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Space Grotesk", sans-serif;
        background-color: #050505;
        background-image: radial-gradient(#1a1a1a 1px, transparent 1px);
        background-size: 32px 32px;
      }
      .mono {
        font-family: "JetBrains Mono", monospace;
      }
      .bento-border {
        border: 1px solid #1f1f1f;
      }
      .card-bg {
        background: rgba(10, 10, 10, 0.95);
        backdrop-filter: blur(12px);
      }
      .app-card:hover {
        border-color: #3f3f46;
        background: rgba(20, 20, 20, 0.5);
        transform: translateY(-2px);
      }
      .custom-scroll::-webkit-scrollbar {
        height: 4px;
      }
      .custom-scroll::-webkit-scrollbar-thumb {
        background: #222;
        border-radius: 10px;
      }
    </style>
  </head>

  <body class="text-zinc-400 antialiased py-8 px-4 sm:px-8">
    <div class="max-w-7xl mx-auto space-y-6">
      <nav
        class="card-bg bento-border rounded-xl p-5 flex justify-between items-center shadow-lg"
      >
        <div class="flex items-center gap-4">
          <div
            class="w-11 h-11 bg-white text-black flex items-center justify-center rounded-lg font-bold text-xl shadow-lg"
          >
            K
          </div>
          <div class="hidden sm:block">
            <h1 class="text-white font-bold leading-none text-base">
              Kunal Auth
            </h1>
            <span
              class="text-[10px] mono text-zinc-600 uppercase tracking-wider block mt-1"
              >Console v2.0</span
            >
          </div>
        </div>

        <div class="flex items-center gap-6">
          <a
            href="#"
            class="text-xs font-bold uppercase tracking-widest text-white border-b-2 border-white pb-1"
            >Apps</a
          >
          <button
            onclick="logout()"
            class="bg-zinc-900 px-4 py-2 rounded-lg text-xs font-bold uppercase tracking-widest text-zinc-400 hover:text-red-400 bento-border transition"
          >
            Logout
          </button>
        </div>
      </nav>

      <div class="grid grid-cols-12 gap-6">
        <div class="col-span-12 lg:col-span-8 space-y-6">
          <div
            class="card-bg bento-border rounded-2xl p-8 flex flex-col md:flex-row justify-between items-start md:items-center gap-6"
          >
            <div>
              <h2 class="text-3xl font-bold text-white tracking-tight">
                Active Clients
              </h2>
              <p class="text-sm text-zinc-500 mt-1">
                Manage your OAuth 2.0 application credentials and scopes.
              </p>
            </div>
            <a
              href="./register-company.html"
              class="bg-white text-black text-xs font-bold uppercase tracking-wider px-6 py-3.5 rounded-xl hover:bg-zinc-200 transition-all flex items-center gap-2 shadow-xl hover:scale-[1.02]"
            >
              <span>+</span> New App
            </a>
          </div>

          <div
            class="grid grid-cols-1 md:grid-cols-2 gap-6"
            id="apps-container"
          >
            <div class="col-span-full py-20 text-center">
              <p class="text-zinc-600 mono text-xs animate-pulse">
                SYNCHRONIZING REPOSITORY...
              </p>
            </div>
          </div>
        </div>

        <div class="col-span-12 lg:col-span-4 space-y-6">
          <div class="card-bg bento-border rounded-2xl p-6">
            <p
              class="text-[10px] mono uppercase tracking-[0.2em] text-zinc-500 mb-6 font-bold"
            >
              Operator Identity
            </p>

            <div class="flex items-center gap-4 mb-2">
              <div
                class="w-14 h-14 bg-gradient-to-br from-zinc-800 to-zinc-900 rounded-xl bento-border shadow-lg flex items-center justify-center text-white font-bold text-xl"
              >
                <span id="userInitials">KM</span>
              </div>

              <div class="overflow-hidden">
                <p id="userName" class="text-white font-bold truncate text-lg">
                  Loading...
                </p>
                <p
                  id="userEmail"
                  class="text-[11px] mono text-zinc-600 truncate"
                >
                  please wait...
                </p>
              </div>
            </div>
          </div>

          <div class="card-bg bento-border rounded-2xl p-6">
            <p
              class="text-[10px] mono uppercase tracking-[0.2em] text-zinc-500 mb-4 font-bold"
            >
              System Status
            </p>
            <div class="flex items-center gap-2">
              <div class="w-2 h-2 bg-emerald-500 rounded-full"></div>
              <p class="text-xs text-zinc-300 mono uppercase tracking-tighter">
                All Systems Operational
              </p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const BASE_URL = "https://sso-production-d29b.up.railway.app";
      document.addEventListener("DOMContentLoaded", () => {
        async function fetchData() {
          try {
            const res = await fetch(`${BASE_URL}/getall-apps`, {
              method: "GET",
              credentials: "include",
            });

            const apps = await res.json();

            const container = document.getElementById("apps-container");

            if (!apps || apps.length === 0) {
              container.innerHTML = `
                <div class="col-span-full border border-dashed border-zinc-900 rounded-2xl p-12 text-center">
                  <p class="text-zinc-600 mono text-xs uppercase tracking-widest">No Active Applications Found</p>
                  <a href="./register-company.html" class="text-white text-[10px] mono underline mt-4 block">Provision your first client</a>
                </div>
              `;
              return;
            }

            // 1. Update User Profile (using first entry in array)
            const user = apps.results[0];

            document.getElementById("userName").innerText =
              `${user.firstName} ${user.lastName}`;
            document.getElementById("userEmail").innerText = user.email;
            document.getElementById("userInitials").innerText = (
              user.firstName[0] + (user.lastName ? user.lastName[0] : "")
            ).toUpperCase();

            // 2. Map through apps
            container.innerHTML = "";

            apps.results.forEach((app) => {
              const appCard = `
                <div class="card-bg bento-border rounded-2xl p-6 app-card transition-all group relative">
                  <div class="flex justify-between items-start mb-6">
                    <div class="w-12 h-12 bg-zinc-900 rounded-xl bento-border flex items-center justify-center text-zinc-500 group-hover:text-white transition">
                      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9-9c1.657 0 3 4.03 3 9s-1.343 9-3 9m0-18c-1.657 0-3 4.03-3 9s1.343 9 3 9m-9-9h18"></path>
                      </svg>
                    </div>
                    <span class="text-[9px] mono px-2.5 py-1 bg-emerald-500/10 text-emerald-500 rounded-full border border-emerald-500/20 font-bold uppercase tracking-wider">
                      Live
                    </span>
                  </div>

                  <h3 class="text-white font-bold text-lg mb-1 truncate">${app.appName}</h3>
                  <p class="text-[10px] text-zinc-500 mono truncate mb-4">${app.applicationURL}</p>
                  
                  <div class="bg-black/40 bento-border rounded-lg p-3 mb-6">
                    <p class="text-[9px] mono uppercase text-zinc-600 mb-1">Client ID</p>
                    <p class="text-[11px] text-zinc-300 mono truncate">${app.clientId}</p>
                  </div>

                  <div class="grid grid-cols-2 gap-3">
                    <button class="text-[10px] mono py-2.5 bg-zinc-900 rounded-lg bento-border hover:text-white transition uppercase font-bold tracking-widest">
                      Settings
                    </button>
                    <button class="text-[10px] mono py-2.5 bg-zinc-900 rounded-lg bento-border hover:text-red-500 transition uppercase font-bold tracking-widest">
                      Revoke
                    </button>
                  </div>
                </div>
              `;
              container.innerHTML += appCard;
            });

            // 3. Add the "Available Slot" placeholder
            container.innerHTML += `
              <div class="border border-dashed border-zinc-900 rounded-2xl p-6 flex flex-col items-center justify-center text-center opacity-40 hover:opacity-100 transition-all cursor-pointer min-h-[240px]">
                <p class="text-[10px] mono uppercase tracking-widest text-zinc-500">Available Slot</p>
                <p class="text-[9px] text-zinc-700 mt-2">Provision extra capacity</p>
              </div>
            `;
          } catch (error) {
            console.error("Fetch Error:", error);
            document.getElementById("apps-container").innerHTML = `
              <div class="col-span-full p-8 bg-red-500/5 border border-red-500/20 rounded-2xl text-center">
                <p class="text-red-500 mono text-xs">FAILED TO CONNECT TO AUTH ENGINE</p>
              </div>
            `;
          }
        }

        fetchData();
      });

      async function logout() {
        try {
          await fetch(`${BASE_URL}/logout`, {method: "POST"});
          window.location.href = "/";
        } catch {
          window.location.href = "/";
        }
      }
    </script>
  </body>
</html>
