<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Authorize | Kunal Auth</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Space Grotesk", sans-serif;
        background-color: #050505;
        background-image: radial-gradient(#1a1a1a 1px, transparent 1px);
        background-size: 24px 24px;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }
      .mono {
        font-family: "JetBrains Mono", monospace;
      }
      .bento-border {
        border: 1px solid #1f1f1f;
      }
      .card-bg {
        background: rgba(10, 10, 10, 0.98);
        backdrop-filter: blur(20px);
      }
      .scope-pill {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid #1f1f1f;
      }
    </style>
  </head>

  <body class="text-zinc-400 antialiased p-6">
    <div
      class="card-bg bento-border rounded-[2rem] p-8 w-full max-w-lg shadow-2xl"
    >
      <!-- HEADER -->
      <div class="flex justify-between items-center mb-10">
        <div class="flex items-center gap-3">
          <div
            class="w-10 h-10 bg-white text-black flex items-center justify-center rounded-xl font-bold text-xl"
          >
            K
          </div>
          <div>
            <h1 class="text-white font-bold text-lg">Kunal Auth</h1>
            <span
              class="text-[9px] mono text-zinc-600 uppercase tracking-[0.2em]"
            >
              Secure Authorization
            </span>
          </div>
        </div>

        <div
          class="text-[10px] mono text-emerald-500 bg-emerald-500/10 px-3 py-1 rounded-full border border-emerald-500/20 uppercase"
        >
          Encrypted
        </div>
      </div>

      <!-- TITLE -->
      <div class="mb-8 text-center md:text-left">
        <h2 class="text-white font-bold text-2xl mb-2">Approve Access</h2>

        <p class="text-zinc-500 text-sm">
          <span id="app-name-inline" class="text-white font-medium"></span>
          is requesting permission to access your account data.
        </p>
      </div>

      <!-- APP INFO -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-8">
        <div class="bento-border bg-white/[0.02] rounded-2xl p-5">
          <p class="text-[10px] mono uppercase text-zinc-600 mb-2">
            Requesting App
          </p>

          <p id="app-name" class="text-white font-bold text-lg truncate"></p>

          <p
            id="app-domain"
            class="text-[10px] mono text-zinc-500 italic mt-1"
          ></p>
        </div>

        <div class="bento-border bg-white/[0.02] rounded-2xl p-5">
          <p class="text-[10px] mono uppercase text-zinc-600 mb-2">
            Verified Source
          </p>

          <div class="flex items-center gap-2">
            <div
              class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"
            ></div>
            <p class="text-zinc-200 text-sm">Trusted Client</p>
          </div>
        </div>

        <!-- SCOPES -->
        <div class="md:col-span-2 bento-border bg-zinc-900/40 rounded-2xl p-6">
          <p class="text-[10px] mono uppercase text-zinc-500 mb-4">
            Requested Permissions
          </p>

          <div id="scopes-container" class="space-y-3"></div>
        </div>
      </div>

      <!-- ACTIONS -->
      <div class="flex flex-col md:flex-row gap-3">
        <button
          id="allowBtn"
          class="flex-1 bg-white text-black py-4 rounded-xl text-xs font-bold uppercase"
        >
          Allow Access
        </button>

        <button
          id="denyBtn"
          class="flex-1 border border-zinc-800 text-zinc-500 py-4 rounded-xl text-xs font-bold uppercase"
        >
          Deny
        </button>
      </div>
    </div>

    <!-- SCRIPT -->
    <script>
      const BASE_URL = "https://sso-production-d29b.up.railway.app";

      const params = new URLSearchParams(window.location.search);

      const client_id = params.get("client_id");
      const redirect_uri = params.get("redirect_uri");
      const state = params.get("state");

      console.log("🔍 Params:", {client_id, redirect_uri, state});

      // 🔥 Load dynamic data
      async function loadClientData() {
        try {
          if (!client_id) {
            console.error("❌ client_id missing in URL");
            return;
          }

          console.log("📡 Fetching consent data...");

          const res = await fetch(
            `${BASE_URL}/consent-data?client_id=${client_id}`,
            {
              credentials: "include",
            },
          );

          console.log("📥 Response status:", res.status);

          if (!res.ok) {
            const text = await res.text();
            console.error("❌ API Error:", text);
            return;
          }

          const data = await res.json();
          console.log("✅ Data received:", data);

          // 🔥 Populate UI
          document.getElementById("app-name").textContent = data.name || "N/A";
          document.getElementById("app-name-inline").textContent =
            data.name || "N/A";
          document.getElementById("app-domain").textContent =
            data.domain || "N/A";

          const container = document.getElementById("scopes-container");
          container.innerHTML = "";

          if (!data.scopes || data.scopes.length === 0) {
            console.warn("⚠️ No scopes found");
            return;
          }

          data.scopes.forEach((scope) => {
            const el = document.createElement("div");

            el.className = "flex items-center gap-4 p-3 rounded-xl scope-pill";

            el.innerHTML = `
          <div class="w-8 h-8 rounded-lg bg-zinc-800 flex items-center justify-center text-zinc-400 text-xs">
            ${scope[0].toUpperCase()}
          </div>
          <div>
            <p class="text-zinc-200 text-sm font-bold mono">${scope}</p>
            <p class="text-[10px] text-zinc-500">Requested permission</p>
          </div>
        `;

            container.appendChild(el);
          });

          console.log("🎯 UI updated successfully");
        } catch (err) {
          console.error("🔥 Fetch error:", err);
        }
      }

      // 🔥 Allow
      async function approve() {
        try {
          console.log("🚀 Sending consent approval...");

          const res = await fetch(`${BASE_URL}/oauth/consent`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            credentials: "include",
            body: JSON.stringify({
              client_id,
              redirect_uri,
              state,
            }),
          });

          console.log("📥 Consent response status:", res.status);

          const data = await res.json();
          console.log("✅ Redirecting to:", data.redirect);

          window.location.replace(data.redirect);
        } catch (err) {
          console.error("❌ Approve error:", err);
        }
      }

      // 🔥 Deny
      function deny() {
        console.log("❌ Access denied");

        let url = redirect_uri + "?error=access_denied";
        if (state) url += "&state=" + state;

        console.log("➡️ Redirecting to:", url);

        window.location.replace(url);
      }

      // init
      loadClientData();

      document.getElementById("allowBtn").onclick = approve;
      document.getElementById("denyBtn").onclick = deny;
    </script>
  </body>
</html>
